# SwiftLint config for PlayerCut.
#
# Build-time only — SwiftLint is not linked into the shipped binary,
# so this does not violate POLICY 1 (no third-party SDKs).
# Source: https://github.com/realm/SwiftLint (MIT).

included:
  - PlayerCut
  - PlayerCutTests
  - PlayerCutUITests

excluded:
  - PlayerCut.xcodeproj
  - PlayerCut/Vision/Stage2-JerseyOCR-Integration.swift
  - PlayerCut/Diagnostics/Diagnostics-Wireup.swift
  - Tools

# Disabled rules — chosen, not "left as default":
# - line_length / file_length / type_body_length / function_body_length:
#   noisy on a project with long Metal shaders and Vision pipelines; not
#   worth chasing here.
# - identifier_name: vDSP-style short names (`x`, `r`, `g`, `b`, `dt`) are
#   idiomatic in DSP code.
# - todo: tracking TODOs is the job of TODO.md / issues, not the linter.
# - trailing_comma: Swift formatter handles this; rule fights real code.
disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - identifier_name
  - todo
  - trailing_comma
  - cyclomatic_complexity
  - nesting

# Opt in to extras that actually catch bugs.
opt_in_rules:
  - force_unwrapping        # The reason we're here.
  - implicitly_unwrapped_optional
  - overridden_super_call
  - unused_import
  - empty_count
  - empty_string
  - first_where
  - last_where
  - reduce_into
  - sorted_first_last
  - fatal_error_message
  - discarded_notification_center_observer
  - private_action
  - private_outlet
  - prohibited_super_call

force_cast:
  severity: warning
force_try:
  severity: warning
force_unwrapping:
  severity: warning

reporter: "xcode"
