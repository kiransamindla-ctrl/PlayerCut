name: PlayerCut
options:
  bundleIdPrefix: com.playercut
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

# Open-source dependencies — every entry must also appear in
# Dependencies.md with license + reason Apple-native is insufficient.
packages:
  MetalPetal:
    url: https://github.com/MetalPetal/MetalPetal
    from: 1.25.2

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  PlayerCut:
    type: application
    platform: iOS
    sources:
      - path: PlayerCut
        excludes:
          - "Vision/Stage2-JerseyOCR-Integration.swift"
          - "Diagnostics/Diagnostics-Wireup.swift"
          - "**/*.md"
    info:
      path: PlayerCut/Info.plist
      properties:
        CFBundleDisplayName: PlayerCut
        NSCameraUsageDescription: PlayerCut records your game to make a highlight reel of your child.
        NSMicrophoneUsageDescription: PlayerCut uses the microphone to find the most exciting moments and add game sound to your reel.
        NSPhotoLibraryAddUsageDescription: PlayerCut saves your finished reel to your Photos. We only add — we never read your library.
        NSBluetoothAlwaysUsageDescription: PlayerCut uses Bluetooth to detect your child's beacon for instant, reliable identification. We never connect to or read other devices.
        NSSpeechRecognitionUsageDescription: PlayerCut transcribes the game's audio on your phone to add captions to your reel. Speech recognition runs on-device and never leaves your phone.
        UIBackgroundModes:
          - processing
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.playercut.app.process-game
          - com.playercut.app.refresh
        UILaunchScreen:
          UIColorName: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playercut.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NFA3VW6VKZ
    entitlements:
      path: PlayerCut/PlayerCut.entitlements
      properties: {}
    dependencies:
      - package: MetalPetal
        product: MetalPetal

  PlayerCutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlayerCutTests
    dependencies:
      - target: PlayerCut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playercut.app.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/PlayerCut.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PlayerCut
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES

  PlayerCutUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PlayerCutUITests
    dependencies:
      - target: PlayerCut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playercut.app.uitests
        TEST_TARGET_NAME: PlayerCut
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: NFA3VW6VKZ

# Explicit scheme so test-time settings (coverage, sanitizers) are
# under source control instead of auto-generated per-machine.
schemes:
  PlayerCut:
    build:
      targets:
        PlayerCut: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - PlayerCut
      # ASan + UBSan on the default scheme. Catches:
      # - OOB / use-after-free in the Metal/Vision/AVFoundation pointer bridges
      # - signed overflow + misalignment in vDSP/DSP code
      # TSan lives on the sibling PlayerCut-TSan scheme — sanitizers are
      # mutually exclusive at run time, so we can't enable both here.
      enableAddressSanitizer: true
      enableUBSanitizer: true
      targets:
        - PlayerCutTests
        - PlayerCutUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  # Race-detector scheme — same targets as PlayerCut, TSan on.
  # Run via: xcodebuild test -scheme PlayerCut-TSan ...
  PlayerCut-TSan:
    build:
      targets:
        PlayerCut: all
    test:
      config: Debug
      enableThreadSanitizer: true
      targets:
        - PlayerCutTests
